<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - LuminaBooks</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">Lumina<span>Books</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="books.html">Books</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><button id="theme-toggle"><i class="fas fa-moon"></i></button></li>
        </ul>
    </div>
</nav>

<main class="contact-container container">
    <div class="contact-grid">
        <div class="contact-info">
            <h1>Let’s Start a <span class="highlight">Conversation</span></h1>
            <p>Have questions about our library or need help with your account? Our team is here to help you turn the next page.</p>
            
            <div class="info-item">
                <div class="icon-circle"><i class="fas fa-envelope"></i></div>
                <div>
                    <h4>Message Us</h4>
                    <p>LuminaBooksPH</p>
                </div>
            </div>

            <div class="info-item">
                <div class="icon-circle"><i class="fas fa-map-marker-alt"></i></div>
                <div>
                    <h4>Visit Our Office</h4>
                    <p>Purok Dimakita, Brgy.Tinago, Soledad, PH (6767) </p>
                </div>
            </div>

            <div class="social-links">
                  <a href="#"><i class="fab fa-facebook"></i></a>
                  <a href="#"><i class="fab fa-messenger"></i></a>
              
                
            </div>
        </div>

        <div class="contact-form-card">
            <form id="contactForm">
                <div class="input-row">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Subject</label>
                    <select id="subject">
                        <option>General Inquiry</option>
                        <option>Book Suggestion</option>
                        <option>Technical Issue</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message here..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    <span>Send Message</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
                <div id="formStatus"></div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
